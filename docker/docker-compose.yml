version: '3.8'

services:
  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: student_prediction_api
    ports:
      - "8000:8000"
    environment:
      - MODEL_VERSION=v1
      - MODEL_PATH=models/v1
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    restart: unless-stopped

